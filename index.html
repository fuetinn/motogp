<!DOCTYPE html>
<html lang="es">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;600;700&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MotoGP</title>

    <!-- Enlace al CSS externo -->
    <link rel="stylesheet" href="css/indexstyle.css">

<body>

    <!-- CABECERA PRINCIPAL -->
    <header class="superior">
        <div class="cabecera">
            <h1>MOTOGP</h1>
        </div>
    </header>

    <nav class="menu-navegacion">
        <a href="index.html" class="active">Principal</a>
        <a href="pilotos.html">Pilotos</a>
        <a href="equipos.html">Equipos</a>
        <a href="clasificación.html">Clasificación</a>

      <!-- 🏁 PRÓXIMA CARRERA -->
    <section class="tarjeta-carrera">

        <h2>Gran Premio de Mugello</h2>

        <!-- 🗺 trazo -->
        <div class="trazo"></div>

        <!-- ⏱ contador -->
        <div class="contador">
            <div>
                <span id="days">00</span>
                <small>Días</small>
            </div>

            <div>
                <span id="hours">00</span>
                <small>Horas</small>
            </div>

            <div>
                <span id="minutes">00</span>
                <small>Min</small>
            </div>

            <div>
                <span id="seconds">00</span>
                <small>Seg</small>
            </div>
        </div>

    </section>


    <!--Llamamos al contador para tener el tiempo que falta para la carrera en tiempo real-->
    <script src="js/contador.js"></script>
