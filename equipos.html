<!DOCTYPE html>
<html lang="es">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;600;700&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MotoGP</title>

    <!-- Enlace al CSS externo -->
    <link rel="stylesheet" href="css/equiposstyle.css">
</head>
<body>

    <!-- CABECERA PRINCIPAL -->
    <header class="superior">
        <div class="cabecera">
            <h1>MOTOGP</h1>
        </div>
    </header>

    <nav class="menu-navegacion">
        <a href="index.html">Principal</a>
        <a href="pilotos.html">Pilotos</a>
        <a href="equipos.html" class="active">Equipos</a>
        <a href="clasificación.html">Clasificación</a>
    </nav>

    <div class="container py-5">
        <div id="contenido">Cargando equipos...</div>
    </div>

    <script>
    async function cargarEquipos() {
        try {
            const cacheBuster = Date.now();
            const [xmlResponse, xsltResponse] = await Promise.all([
                fetch(`xml/equipos.xml?ts=${cacheBuster}`),
                fetch(`xslt/equipos.xslt?ts=${cacheBuster}`)
            ]);

            if (!xmlResponse.ok || !xsltResponse.ok) {
                throw new Error(`Error cargando archivos: XML=${xmlResponse.status} XSLT=${xsltResponse.status}`);
            }

            const parser = new DOMParser();
            const xml = parser.parseFromString(await xmlResponse.text(), "application/xml");
            const xslt = parser.parseFromString(await xsltResponse.text(), "application/xml");

            if (xml.querySelector("parsererror") || xslt.querySelector("parsererror")) {
                throw new Error("Error de parseo XML o XSLT. Revisa la sintaxis de los archivos.");
            }

            const processor = new XSLTProcessor();
            processor.importStylesheet(xslt);
            const fragment = processor.transformToFragment(xml, document);

            const contenido = document.getElementById("contenido");
            if (!contenido) {
                throw new Error('No se encontró el elemento #contenido en la página.');
            }

            contenido.innerHTML = "";
            contenido.appendChild(fragment);
        } catch (error) {
            console.error(error);
            const contenido = document.getElementById("contenido");
            if (contenido) {
                contenido.textContent = `Error al cargar equipos: ${error.message}`;
            }
        }
    }

    window.addEventListener("DOMContentLoaded", cargarEquipos);
    </script>
</body>
</html>
