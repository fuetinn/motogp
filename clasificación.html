<!DOCTYPE html>
<html lang="es">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;600;700&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MotoGP</title>

    <!-- Enlace al CSS externo -->
    <link rel="stylesheet" href="css/clasificacionstyle.css">
</head>
<body>

    <!-- CABECERA PRINCIPAL -->
    <header class="hero">
        <div class="overlay">
            <h1>MOTOGP</h1>
        </div>
    </header>

    <nav class="menu">
        <a href="index.html">Principal</a>
        <a href="calendario.html">Calendario</a>
        <a href="pilotos.html">Pilotos</a>
        <a href="equipos.html">Equipos</a>
        <a href="clasificación.html" class="active">Clasificación</a>
    </nav>

    <div class="container py-5">
        <div id="contenido"></div>
    </div>

    <script>
    async function cargarClasificacion() {
        try {
            const [pilotosResponse, equiposResponse] = await Promise.all([
                fetch("xml/pilotos.xml"),
                fetch("xml/equipos.xml")
            ]);

            if (!pilotosResponse.ok || !equiposResponse.ok) {
                throw new Error(`Error cargando archivos: pilotos=${pilotosResponse.status} equipos=${equiposResponse.status}`);
            }

            const parser = new DOMParser();
            const pilotosXml = parser.parseFromString(await pilotosResponse.text(), "application/xml");
            const equiposXml = parser.parseFromString(await equiposResponse.text(), "application/xml");

            if (pilotosXml.querySelector("parsererror") || equiposXml.querySelector("parsererror")) {
                throw new Error("Error de parseo XML. Revisa la sintaxis de los archivos.");
            }

            const pilotos = Array.from(pilotosXml.querySelectorAll("piloto")).map((pilot) => ({
                nombre: pilot.querySelector("nombre")?.textContent.trim() || "",
                numero: pilot.querySelector("numero")?.textContent.trim() || "",
                pais: pilot.querySelector("pais")?.textContent.trim() || "",
                equipo: pilot.querySelector("equipo")?.textContent.trim() || "",
                victorias: Number(pilot.querySelector("victorias")?.textContent || 0),
                podios: Number(pilot.querySelector("podios")?.textContent || 0),
                poles: Number(pilot.querySelector("poles")?.textContent || 0),
                puntos: Number(pilot.querySelector("puntos")?.textContent || 0)
            }));

            pilotos.sort((a, b) => b.puntos - a.puntos);

            const equipos = Array.from(equiposXml.querySelectorAll("equipo")).map((team) => {
                const name = team.querySelector("nombre")?.textContent.trim() || "";
                const points = pilotos
                    .filter((pilot) => pilot.equipo === name)
                    .reduce((sum, pilot) => sum + pilot.puntos, 0);

                return {
                    nombre: name,
                    pais: team.querySelector("pais")?.textContent.trim() || "",
                    moto: team.querySelector("moto")?.textContent.trim() || "",
                    pilotos: team.querySelector("pilotos")?.textContent.trim() || "",
                    puntos: points
                };
            });

            equipos.sort((a, b) => b.puntos - a.puntos);

            const pilotosHtml = pilotos.map((pilot, index) => `
                <div class="col-12">
                    <div class="card piloto-card bg-black border-danger text-white h-100">
                        <div class="card-body position-card">
                            <span class="position-badge">#${index + 1}</span>
                            <h3 class="piloto-nombre">${pilot.nombre}</h3>
                            <p><strong>Número:</strong> ${pilot.numero}</p>
                            <p><strong>País:</strong> ${pilot.pais}</p>
                            <p><strong>Equipo:</strong> ${pilot.equipo}</p>
                            <hr/>
                            <div class="row text-center">
                                <div class="col-6">
                                    <h5>Victorias</h5>
                                    <p>${pilot.victorias}</p>
                                </div>
                                <div class="col-6">
                                    <h5>Podios</h5>
                                    <p>${pilot.podios}</p>
                                </div>
                                <div class="col-6">
                                    <h5>Poles</h5>
                                    <p>${pilot.poles}</p>
                                </div>
                                <div class="col-6">
                                    <h5>Puntos</h5>
                                    <p class="text-warning fs-4">${pilot.puntos}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `).join("");

            const equiposHtml = equipos.map((team, index) => `
                <div class="col-12">
                    <div class="card piloto-card bg-black border-danger text-white h-100">
                        <div class="card-body position-card">
                            <span class="position-badge">#${index + 1}</span>
                            <h3 class="piloto-nombre">${team.nombre}</h3>
                            <p><strong>Puntos:</strong> ${team.puntos}</p>
                            <p><strong>País:</strong> ${team.pais}</p>
                            <p><strong>Moto:</strong> ${team.moto}</p>
                            <p><strong>Pilotos:</strong> ${team.pilotos}</p>
                        </div>
                    </div>
                </div>
            `).join("");

            const pilotosRows = pilotos.map((pilot, index) => `
                <tr>
                    <td>${index + 1}</td>
                    <td>${pilot.nombre}</td>
                    <td>${pilot.equipo}</td>
                    <td>${pilot.puntos}</td>
                    <td>${pilot.victorias}</td>
                    <td>${pilot.podios}</td>
                    <td>${pilot.poles}</td>
                </tr>
            `).join("");

            const equiposRows = equipos.map((team, index) => `
                <tr>
                    <td>${index + 1}</td>
                    <td>${team.nombre}</td>
                    <td>${team.puntos}</td>
                    <td>${team.pais}</td>
                    <td>${team.moto}</td>
                </tr>
            `).join("");

            const html = `
                <div class="clasificacion-layout">
                    <section class="clasificacion-column pilotos-column">
                        <h2>Clasificación pilotos</h2>
                        <div class="table-container">
                            <table class="clasificacion-table">
                                <thead>
                                    <tr>
                                        <th>#</th>
                                        <th>Piloto</th>
                                        <th>Equipo</th>
                                        <th>Puntos</th>
                                        <th>Victorias</th>
                                        <th>Podios</th>
                                        <th>Poles</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${pilotosRows}
                                </tbody>
                            </table>
                        </div>
                    </section>
                    <section class="clasificacion-column equipos-column">
                        <h2>Clasificación equipos</h2>
                        <div class="table-container">
                            <table class="clasificacion-table">
                                <thead>
                                    <tr>
                                        <th>#</th>
                                        <th>Equipo</th>
                                        <th>Puntos</th>
                                        <th>País</th>
                                        <th>Moto</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${equiposRows}
                                </tbody>
                            </table>
                        </div>
                    </section>
                </div>
            `;

            const contenedor = document.getElementById("contenido");
            if (!contenedor) {
                throw new Error('No se encontró el elemento #contenido en la página.');
            }
            contenedor.innerHTML = html;
        } catch (error) {
            console.error(error);
            const contenedor = document.getElementById("contenido");
            if (contenedor) {
                contenedor.textContent = `Error al cargar la clasificación: ${error.message}`;
            }
        }
    }

    window.addEventListener("DOMContentLoaded", cargarClasificacion);
    </script>
</body>
</html>
