<!DOCTYPE html>
<html lang="es">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;600;700&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MotoGP</title>

    <!-- Enlace al CSS externo -->
    <link rel="stylesheet" href="css/clasificacionstyle.css">
</head>
<body>

    <!-- CABECERA PRINCIPAL -->
    <header class="hero">
        <div class="overlay">
            <h1>MOTOGP</h1>
        </div>
    </header>

    <nav class="menu">
        <a href="index.html">Principal</a>
        <a href="calendario.html">Calendario</a>
        <a href="pilotos.html">Pilotos</a>
        <a href="equipos.html">Equipos</a>
        <a href="clasificación.html" class="active">Clasificación</a>
    </nav>

    <div class="container py-5">
        <div id="contenido"></div>
    </div>

    <script>
    async function cargarClasificacion() {
        try {
            const cacheBuster = Date.now();
            const [pilotosResponse, equiposResponse, xsltResponse] = await Promise.all([
                fetch(`xml/pilotos.xml?ts=${cacheBuster}`),
                fetch(`xml/equipos.xml?ts=${cacheBuster}`),
                fetch(`xslt/clasificacion.xslt?ts=${cacheBuster}`)
            ]);

            if (!pilotosResponse.ok || !equiposResponse.ok || !xsltResponse.ok) {
                throw new Error(`Error cargando archivos: pilotos=${pilotosResponse.status} equipos=${equiposResponse.status} XSLT=${xsltResponse.status}`);
            }

            const parser = new DOMParser();
            const pilotosXml = parser.parseFromString(await pilotosResponse.text(), "application/xml");
            const equiposXml = parser.parseFromString(await equiposResponse.text(), "application/xml");
            const xslt = parser.parseFromString(await xsltResponse.text(), "application/xml");

            if (pilotosXml.querySelector("parsererror") || equiposXml.querySelector("parsererror") || xslt.querySelector("parsererror")) {
                throw new Error("Error de parseo XML o XSLT. Revisa la sintaxis de los archivos.");
            }

            const combined = parser.parseFromString("<datos></datos>", "application/xml");
            combined.documentElement.appendChild(combined.importNode(pilotosXml.documentElement, true));
            combined.documentElement.appendChild(combined.importNode(equiposXml.documentElement, true));

            const processor = new XSLTProcessor();
            processor.importStylesheet(xslt);

            const fragment = processor.transformToFragment(combined, document);
            const contenedor = document.getElementById("contenido");
            contenedor.innerHTML = "";
            contenedor.appendChild(fragment);
        } catch (error) {
            console.error(error);
            document.getElementById("contenido").textContent = "Error al cargar la clasificación. Abre la consola para más detalles.";
        }
    }

    cargarClasificacion();
    </script>
</body>
</html>
