<!DOCTYPE html>

    <link rel="stylesheet" href="css/pilotosstyle.css?v=2">
</head>

<!-- ================= CABECERA ================= -->

    <div class="cabecera">
        <h1>MOTOGP</h1>
    </div>
</header>

<!-- ================= CONTENIDO ================= -->
<div class="container py-5">
   
    <div id="contenido"></div>
</div>

<!-- ================= JS XSLT ================= -->
<script>
async function cargarXML() {
    try {
        const cacheBuster = Date.now();
        const [xmlResponse, xsltResponse] = await Promise.all([
            fetch(`xml/pilotos.xml?ts=${cacheBuster}`),
            fetch(`xslt/pilotos.xslt?ts=${cacheBuster}`)
        ]);

        if (!xmlResponse.ok || !xsltResponse.ok) {
            throw new Error(`Error cargando archivos: XML=${xmlResponse.status} XSLT=${xsltResponse.status}`);
        }

        const parser = new DOMParser();
        const xml = parser.parseFromString(await xmlResponse.text(), "application/xml");
        const xslt = parser.parseFromString(await xsltResponse.text(), "application/xml");

        if (xml.querySelector("parsererror") || xslt.querySelector("parsererror")) {
            throw new Error("Error de parseo XML o XSLT. Revisa la sintaxis de los archivos.");
        }

        const processor = new XSLTProcessor();
        processor.importStylesheet(xslt);

        const fragment = processor.transformToFragment(xml, document);
        if (!fragment || !(fragment instanceof Node)) {
            throw new Error('La transformación XSLT no devolvió un fragmento válido. Revisa el archivo XSLT.');
        }

        const contenedor = document.getElementById("contenido");
        if (!contenedor) {
            throw new Error('No se encontró el contenedor de resultados en la página.');
        }

        contenedor.innerHTML = "";
        contenedor.appendChild(fragment);
    } catch (error) {
        console.error(error);
        const contenido = document.getElementById("contenido");
        if (contenido) {
            contenido.textContent = `Error al cargar los datos: ${error.message}`;
        }
    }
}

cargarXML();
</script>

</body>
</html>
