<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pilotos MotoGP</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/pilotosstyle.css">
</head>

<body class="bg-dark text-white">

<!-- ================= CABECERA ================= -->
<header class="hero">
    <div class="overlay">
        <h1>MOTOGP PILOTOS</h1>
    </div>
</header>

<!-- ================= MENÚ ================= -->
<nav class="menu">
    <a href="index.html">Principal</a>
    <a href="pilotos.html" class="active">Pilotos</a>
    <a href="clasificación.html">Clasificación</a>
    <a href="equipos.html">Equipos</a>
</nav>


<!-- ================= CONTENIDO ================= -->
<div class="container py-5">
    <h2 class="text-center text-danger mb-5">Pilotos del Mundial</h2>

    <div id="contenido"></div>
</div>

<!-- ================= JS XSLT ================= -->
<script>
async function cargarXML() {
    try {
        const [xmlResponse, xsltResponse] = await Promise.all([
            fetch("xml/pilotos.xml"),
            fetch("xslt/pilotos.xslt")
        ]);

        if (!xmlResponse.ok || !xsltResponse.ok) {
            throw new Error(`Error cargando archivos: XML=${xmlResponse.status} XSLT=${xsltResponse.status}`);
        }

        const parser = new DOMParser();
        const xml = parser.parseFromString(await xmlResponse.text(), "application/xml");
        const xslt = parser.parseFromString(await xsltResponse.text(), "application/xml");

        if (xml.querySelector("parsererror") || xslt.querySelector("parsererror")) {
            throw new Error("Error de parseo XML o XSLT. Revisa la sintaxis de los archivos.");
        }

        const processor = new XSLTProcessor();
        processor.importStylesheet(xslt);

        const fragment = processor.transformToFragment(xml, document);
        const contenedor = document.getElementById("contenido");
        contenedor.innerHTML = "";
        contenedor.appendChild(fragment);
    } catch (error) {
        console.error(error);
        document.getElementById("contenido").textContent = "Error al cargar los datos. Abre la consola para más detalles.";
    }
}

cargarXML();
</script>

</body>
</html>
