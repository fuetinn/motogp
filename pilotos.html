<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pilotos MotoGP</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/pilotosstyle.css">
</head>

<body class="bg-dark text-white">

<!-- ================= CABECERA ================= -->
<header class="hero">
    <div class="overlay">
        <h1>MOTOGP PILOTOS</h1>
    </div>
</header>

<!-- ================= MENÚ ================= -->
<nav class="menu">
    <a href="index.html">Principal</a>
    <a href="pilotos.html" class="active">Pilotos</a>
    <a href="clasificacion.html">Clasificación</a>
    <a href="equipos.html">Equipos</a>
</nav>


<!-- ================= CONTENIDO ================= -->
<div class="container py-5">
    <h2 class="text-center text-danger mb-5">Pilotos del Mundial</h2>

    <div id="contenido"></div>
</div>

<!-- ================= JS XSLT ================= -->
<script>
function cargarXML() {

    const xhrXML = new XMLHttpRequest();
    xhrXML.open("GET", "xml/pilotos.xml", true);

    xhrXML.onload = function () {

        const xml = xhrXML.responseXML;

        const xhrXSLT = new XMLHttpRequest();
        xhrXSLT.open("GET", "xslt/pilotos.xslt", true);

        xhrXSLT.onload = function () {

            const xslt = xhrXSLT.responseXML;

            const processor = new XSLTProcessor();
            processor.importStylesheet(xslt);

            const result = processor.transformToFragment(xml, document);

            document.getElementById("contenido").appendChild(result);
        };

        xhrXSLT.send();
    };

    xhrXML.send();
}

cargarXML();
</script>

</body>
</html>
